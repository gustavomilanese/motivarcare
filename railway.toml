# Configuración Railway (raíz del monorepo).
# Creá dos servicios desde el mismo repo: "api" y "outbox" (mismas variables; distinto start).
# build:api = prisma generate + tsc de @therapy/api

[build]
builder = "NIXPACKS"
# rm -rf + cache fuera del árbol evita EBUSY en node_modules/.cache (Nixpacks/Docker).
buildCommand = "rm -rf node_modules && npm ci --cache /tmp/npm-cache && npm run build:api"

[deploy]
startCommand = "npm run start -w @therapy/api"
healthcheckPath = "/health/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
