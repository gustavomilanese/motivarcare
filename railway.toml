# Configuración Railway (raíz del monorepo).
# Creá dos servicios desde el mismo repo: "api" y "outbox" (mismas variables; distinto start).
# build:api = prisma generate + tsc de @therapy/api

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Antes de levantar la nueva versión: alinear MySQL con `schema.prisma` (mismo flujo que local `db:push`).
# En el servicio **outbox**, definí `SKIP_RELEASE_DB_PUSH=1` para no repetir el push (opcional; dos push seguidos suelen ser inocuos).
releaseCommand = "sh -c 'if [ \"$SKIP_RELEASE_DB_PUSH\" = \"1\" ]; then echo \"[release] omitiendo db push (SKIP_RELEASE_DB_PUSH=1)\"; exit 0; else node apps/api/scripts/prisma-with-root-env.mjs db push; fi'"
startCommand = "npm run start -w @therapy/api"
# Railway marca el deploy como saludable si esta URL responde 200. `/health/live` solo comprueba que el proceso HTTP está arriba (no falla si MySQL aún no conecta).
# Para monitoreo “DB lista”, usá manualmente GET /health/ready o métricas; si tu DB está bien, podés volver a `/health/ready` aquí.
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
