# Configuración Railway (raíz del monorepo).
# Creá dos servicios desde el mismo repo: "api" y "outbox" (mismas variables; distinto start).
# build:api = prisma generate + tsc de @therapy/api

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Antes de levantar la nueva versión: alinear MySQL con `schema.prisma` (mismo flujo que local `db:push`).
# En el servicio **outbox**, definí `SKIP_RELEASE_DB_PUSH=1` para no repetir el push (opcional; dos push seguidos suelen ser inocuos).
# Log explícito: si en prod ves P2022 "column does not exist", buscá en Deploy Logs la línea [release].
# SKIP_RELEASE_DB_PUSH=1 solo en el worker outbox, no en el servicio API.
releaseCommand = "sh -c 'echo \"[release] comprobando SKIP_RELEASE_DB_PUSH (si es 1, no se toca la base)\"; if [ \"$SKIP_RELEASE_DB_PUSH\" = \"1\" ]; then echo \"[release] OMITIENDO prisma db push — la base no se actualiza en este deploy\"; exit 0; else echo \"[release] ejecutando prisma db push contra DATABASE_URL...\"; node apps/api/scripts/prisma-with-root-env.mjs db push; fi'"
startCommand = "npm run start -w @therapy/api"
# Healthcheck = probe HTTP de Railway hacia el contenedor. Si falla siempre, en el servicio (Settings) podés desactivar el health check como último recurso; el tráfico sigue, pero perdes señal de “listo”.
# `/health/live` = solo “el proceso responde” (no exige MySQL).
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
