<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Composicion abstracta inspirada en Kandinsky</title>
  <desc id="desc">Obra abstracta con circulos, lineas y formas geometricas sobre fondo claro.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="100%" stop-color="#e9eef8"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd76b"/>
      <stop offset="100%" stop-color="#f2a93b"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1220" cy="200" r="170" fill="url(#sun)" opacity="0.9"/>
  <circle cx="1180" cy="210" r="95" fill="#f5f8ff" opacity="0.75"/>

  <rect x="120" y="110" width="340" height="210" fill="#1f2f56" rx="14"/>
  <rect x="160" y="150" width="100" height="130" fill="#df3c3c" rx="8"/>
  <rect x="282" y="150" width="130" height="130" fill="#f0d457" rx="8"/>

  <path d="M120 640 C420 480, 720 760, 1080 600 C1220 540, 1360 620, 1480 560" fill="none" stroke="#20304f" stroke-width="18" stroke-linecap="round"/>
  <path d="M80 700 C380 600, 700 860, 1080 720 C1240 660, 1380 760, 1540 700" fill="none" stroke="#d53838" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <circle cx="450" cy="620" r="150" fill="#2e4d89" opacity="0.92"/>
  <circle cx="450" cy="620" r="100" fill="#f8f6ef"/>
  <circle cx="450" cy="620" r="52" fill="#d53838"/>

  <circle cx="820" cy="420" r="120" fill="#15284a" opacity="0.95"/>
  <circle cx="820" cy="420" r="70" fill="#ffefcf"/>
  <circle cx="820" cy="420" r="30" fill="#173a74"/>

  <polygon points="980,320 1110,520 850,520" fill="#d53838" opacity="0.95"/>
  <polygon points="1020,350 1080,490 930,490" fill="#f4d96b"/>

  <line x1="230" y1="420" x2="700" y2="290" stroke="#223659" stroke-width="8"/>
  <line x1="250" y1="470" x2="690" y2="740" stroke="#d53838" stroke-width="8"/>
  <line x1="1080" y1="220" x2="1470" y2="410" stroke="#223659" stroke-width="7"/>

  <circle cx="1340" cy="650" r="76" fill="#1e335d"/>
  <circle cx="1340" cy="650" r="44" fill="#f3d86a"/>

  <text x="96" y="844" font-family="Georgia, serif" font-size="34" fill="#24385f" opacity="0.9">
    Inspirado en la abstraccion geometrica
  </text>
</svg>
